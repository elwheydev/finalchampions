<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Champions League</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    background:
    radial-gradient(circle at top,#17326e 0%,#0a1228 40%,#050913 100%);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:1000px;
    max-width:100%;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
    position:relative;
}

.card::before{
    content:'';
    position:absolute;
    inset:0;
    background:
    linear-gradient(135deg,
    rgba(0,102,255,.15),
    rgba(255,255,255,.03),
    rgba(0,102,255,.15));
    pointer-events:none;
}

.top{
    padding:30px;
    text-align:center;
}

.champions-logo{
    width:70px;
    margin-bottom:15px;
    filter:drop-shadow(0 0 10px rgba(255,255,255,.3));
}

.tag{
    display:inline-block;
    padding:8px 20px;
    border-radius:50px;
    background:#0f5fff;
    color:#fff;
    font-weight:700;
    font-size:14px;
    letter-spacing:2px;
}

.title{
    margin-top:20px;
    font-size:52px;
    font-weight:800;
    color:white;
    text-transform:uppercase;
}

.subtitle{
    color:#cfd8ff;
    margin-top:10px;
    font-size:18px;
}

.match{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:50px;
    padding:40px;
    flex-wrap:wrap;
}

.team{
    text-align:center;
}

.team img{
    width:130px;
    height:130px;
    object-fit:contain;
    background:white;
    border-radius:50%;
    padding:10px;
    box-shadow:0 0 30px rgba(255,255,255,.15);
}

.team h2{
    margin-top:15px;
    color:white;
    font-size:32px;
}

.vs{
    font-size:60px;
    font-weight:800;
    color:#ffffff;
    text-shadow:0 0 25px #0f5fff;
}

.bottom{
    text-align:center;
    padding:20px 40px 50px;
}

.watch-btn{
    display:inline-flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    color:white;
    background:linear-gradient(90deg,#0066ff,#00b7ff);
    padding:18px 45px;
    border-radius:60px;
    font-size:22px;
    font-weight:800;
    transition:.3s;
    box-shadow:0 10px 30px rgba(0,102,255,.4);
}

.watch-btn:hover{
    transform:translateY(-3px);
}

.sbt{
    margin-top:25px;
}

.sbt img{
    width:90px;
    border-radius:50%;
    background:white;
    padding:5px;
}

.live{
    color:#fff;
    margin-top:10px;
    font-size:18px;
    font-weight:600;
}

.date{
    color:#cfd8ff;
    margin-top:15px;
    font-size:15px;
}

@media(max-width:768px){
    .title{
        font-size:36px;
    }

    .team img{
        width:100px;
        height:100px;
    }

    .vs{
        font-size:42px;
    }
}
</style>
</head>
<body>

<div class="card">

    <div class="top">

        <!-- Logo Champions -->
        <img
        class="champions-logo"
        src="https://upload.wikimedia.org/wikipedia/en/b/bf/UEFA_Champions_League_logo_2.svg"
        alt="Champions">

        <div class="tag">AO VIVO</div>

        <div class="title">
            FINAL CHAMPIONS LEAGUE
        </div>

        <div class="subtitle">
            Assista agora à decisão da maior competição da Europa
        </div>

    </div>

    <div class="match">

        <div class="team">
            <!-- Logo PSG -->
            <img src="https://upload.wikimedia.org/wikipedia/en/a/a7/Paris_Saint-Germain_F.C..svg" alt="PSG">
            <h2>PSG</h2>
        </div>

        <div class="vs">VS</div>

        <div class="team">
            <!-- Logo Arsenal -->
            <img src="https://upload.wikimedia.org/wikipedia/en/5/53/Arsenal_FC.svg" alt="Arsenal">
            <h2>Arsenal</h2>
        </div>

    </div>

    <div class="bottom">

        <a href="#" class="watch-btn">
            ▶ ASSISTIR AGORA
        </a>

        <div class="sbt">
            <!-- Logo SBT -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/SBT_logo_2015.svg" alt="SBT">
        </div>

        <div class="live">
            Transmissão exclusiva pelo SBT
        </div>

        <div class="date">
            UEFA Champions League • Grande Final
        </div>

    </div>

</div>

</body>
</html>
